version: "3.8"

services:
  ipaddress-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-1.0.0}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    container_name: ipaddress-api
    ports:
      - "${SERVER_PORT:-30661}:30661"
    environment:
      - GIN_MODE=release
      - CONFIG_PATH=/app/configs/config.yaml
      - REDIS__HOST=redis
      - REDIS__PORT=6379
      - REDIS__PASSWORD=${REDIS_PASSWORD:-}
      - REDIS__DB=0
      - REDIS__DIAL_TIMEOUT=5
      - REDIS__READ_TIMEOUT=3
      - REDIS__WRITE_TIMEOUT=3
      - CACHE__TTL=3600
      - RATELIMIT__ENABLED=true
      - RATELIMIT__REQUESTS_PER_SECOND=${RATE_LIMIT_RPS:-100}
      - RATELIMIT__BURST=${RATE_LIMIT_BURST:-200}
      - TRUST_PROXY__ENABLED=true
      - TRUST_PROXY__REAL_IP_HEADER=X-Real-IP
    volumes:
      - ./ipdata:/app/ipdata
      - ./configs:/app/configs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30661/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - ipaddress-network

  redis:
    image: redis:7-alpine
    container_name: ipaddress-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - ipaddress-network

networks:
  ipaddress-network:
    driver: bridge

volumes:
  redis-data:
