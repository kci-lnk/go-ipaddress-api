services:
  ipaddress-api:
    image: kcilnk/go-ipaddress-api:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-1.0.1}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
        http_proxy: ""
        https_proxy: ""
        ALL_PROXY: ""
        all_proxy: ""
    container_name: ipaddress-api
    ports:
      - "${SERVER_PORT:-30661}:30661"
    environment:
      - HTTP_PROXY=""
      - HTTPS_PROXY=""
      - http_proxy=""
      - https_proxy=""
      - ALL_PROXY=""
      - all_proxy=""
      - GIN_MODE=release
      - SERVER__HOST=0.0.0.0
      - SERVER__PORT=30661
      - SERVER__READ_TIMEOUT=10s
      - SERVER__WRITE_TIMEOUT=10s
      - SERVER__IDLE_TIMEOUT=60s
      - SERVER__MAX_HEADER_BYTES=4096
      - REDIS__HOST=redis
      - REDIS__PORT=6379
      - REDIS__PASSWORD=${REDIS__PASSWORD:-}
      - REDIS__DB=${REDIS__DB:-0}
      - REDIS__POOL_SIZE=${REDIS__POOL_SIZE:-10}
      - REDIS__DIAL_TIMEOUT=5s
      - REDIS__READ_TIMEOUT=3s
      - REDIS__WRITE_TIMEOUT=3s
      - CACHE__TTL=${CACHE__TTL:-3600}
      - RATELIMIT__ENABLED=${RATELIMIT__ENABLED:-true}
      - RATELIMIT__REQUESTS_PER_SECOND=${RATELIMIT__REQUESTS_PER_SECOND:-100}
      - RATELIMIT__BURST=${RATELIMIT__BURST:-200}
      - TRUST_PROXY__ENABLED=${TRUST_PROXY__ENABLED:-true}
      - TRUST_PROXY__REAL_IP_HEADER=X-Real-IP
      - LOG__LEVEL=info
      - LOG__FORMAT=json
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30661/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - ipaddress-network

  redis:
    image: redis:7-alpine
    container_name: ipaddress-redis
    command: redis-server --appendonly yes
    environment:
      - REDIS__PASSWORD=${REDIS__PASSWORD:-}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - ipaddress-network

networks:
  ipaddress-network:
    driver: bridge

volumes:
  redis-data:
